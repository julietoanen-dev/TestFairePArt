<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julie &amp; Thomas — 24 juillet 2027</title>
  <meta name="description" content="Julie &amp; Thomas se disent oui le 24 juillet 2027 à Verfeil. Venez célébrer avec nous !" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- ✅ Précharge la lanterne : évite le micro “clac” au chargement -->
  <link rel="preload" as="image" href="https://framerusercontent.com/images/6tUL6N8p40INoMoTwAhxIStFQEM.png" />

<style>
  :root{
    --rose:#FF3CAC;
    --corail:#FF6B35;
    --ambre:#FFB347;
    --rouge:#b5341a;
    --blanc:#ffffff;
    --texte:#2e1200;
    --texte-soft:rgba(46,18,0,0.5);
    --font-titre:'Playfair Display', Georgia, serif;
    --font-texte:'Montserrat', system-ui, sans-serif;
    --radius:14px;

    /* palette fond inspi */
    --sky-1:#ff5aa8;   /* rose */
    --sky-2:#ff8a57;   /* pêche/corail */
    --sky-3:#b56cff;   /* violet */
    --sky-4:#ffd1a6;   /* crème chaud */
    --haze:#ffd7c0;
    --mount-1:#7a3b8f; /* violet sombre */
    --mount-2:#5a2e6f; /* violet plus sombre */
    --forest-1:#163b2b;
    --forest-2:#0f2a1f;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;font-size:16px}
  body{
    font-family:var(--font-texte);
    color:var(--texte);
    overflow-x:hidden;
    background:transparent;
  }
  img,svg{display:block;max-width:100%}
  a{color:var(--corail);text-decoration:none}
  a:hover{text-decoration:underline}
  a:focus-visible{outline:3px solid var(--corail);outline-offset:3px;border-radius:3px}

  h1,h2,h3{font-family:var(--font-titre);line-height:1.15}
  h1{font-size:clamp(3rem,9vw,7rem);color:var(--blanc)}
  p{line-height:1.7}

  .container{width:min(90%,960px);margin-inline:auto}
  section{padding:90px 0;position:relative;z-index:2}

  /* reveal */
  .reveal{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease}
  .reveal.visible{opacity:1;transform:translateY(0)}
  .reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .7s ease,transform .7s ease}
  .reveal-left.visible{opacity:1;transform:translateX(0)}
  .reveal-right{opacity:0;transform:translateX(40px);transition:opacity .7s ease,transform .7s ease}
  .reveal-right.visible{opacity:1;transform:translateX(0)}

  @media (prefers-reduced-motion: reduce){
    .reveal,.reveal-left,.reveal-right{opacity:1;transform:none;transition:none}
  }

  #page-wrapper{position:relative;min-height:100vh}

  /* ====== PANORAMA INSPI (ciel aquarelle + Pyrénées + forêt) ====== */
  #panorama{
    position:absolute;top:0;left:0;width:100%;
    z-index:0;pointer-events:none;
  }

  /* ====== LANTERNES ====== */
  #lanterns-layer{
    position:fixed;top:0;left:0;width:100%;height:100vh;
    z-index:1;pointer-events:none;
    will-change:transform;
    transform:translate3d(0,0,0);
  }
  #lanterns-layer svg{
    position:absolute;top:0;left:0;width:100%;height:100%;
    overflow:visible;
  }

  /* anti "coac" : 0% appliqué avant 1ère frame + GPU stable */
  .lantern{
    animation-fill-mode:both;
    will-change:transform;
    transform:translate3d(0,0,0);
    backface-visibility:hidden;
  }

  @keyframes float-a{0%,100%{transform:translate3d(0,0,0) rotate(-7deg)}50%{transform:translate3d(0,-18px,0) rotate(7deg)}}
  @keyframes float-b{0%,100%{transform:translate3d(0,0,0) rotate(6deg)}50%{transform:translate3d(0,-24px,0) rotate(-6deg)}}
  @keyframes float-c{0%,100%{transform:translate3d(0,0,0) rotate(-4deg)}50%{transform:translate3d(0,-12px,0) rotate(9deg)}}
  @keyframes float-d{0%,100%{transform:translate3d(0,0,0) rotate(10deg)}50%{transform:translate3d(0,-20px,0) rotate(-4deg)}}
  @keyframes float-e{0%,100%{transform:translate3d(0,0,0) rotate(-10deg)}50%{transform:translate3d(0,-16px,0) rotate(5deg)}}

  /* glow léger (proche inspi) */
  .lantern image{
    filter:drop-shadow(0 0 10px rgba(255,107,53,0.18));
  }

  /* ====== HERO ====== */
  #hero{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
    z-index:2;
  }
  .hero-content{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:18px}
  .hero-date{
    font-family:var(--font-texte);
    font-weight:400;
    font-size:clamp(.85rem,1.8vw,1rem);
    color:rgba(255,255,255,.82);
    letter-spacing:.25em;
    text-transform:uppercase;
  }
  .hero-tagline{
    font-family:var(--font-titre);
    font-style:italic;
    font-size:clamp(1.1rem,2.5vw,1.5rem);
    color:rgba(255,255,255,.92);
    max-width:520px;
    text-shadow:0 2px 18px rgba(0,0,0,.14);
  }

  /* scroll hint + ">>" vers le bas (2 chevrons) */
  .hero-scroll-hint{
    margin-top:50px;
    color:rgba(255,255,255,.62);
    font-size:.72rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    display:inline-flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    user-select:none;
  }
  .scroll-arrows{
    width:26px;height:26px;
    opacity:.95;
    overflow:visible;
  }
  .scroll-arrows path{
    stroke:rgba(255,255,255,.78);
    stroke-width:2.4;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .scroll-arrows .a1{animation:arrow 1.4s ease-in-out infinite}
  .scroll-arrows .a2{animation:arrow 1.4s ease-in-out infinite .18s;opacity:.85}
  @keyframes arrow{
    0%,100%{transform:translate3d(0,0,0);opacity:.55}
    50%{transform:translate3d(0,6px,0);opacity:1}
  }

  /* ====== COUNTDOWN ====== */
  #countdown{ text-align:center; padding:60px 20px 70px; position:relative; z-index:2; }
  .countdown-grid{ display:flex; justify-content:center; gap:clamp(6px,2vw,18px); flex-wrap:nowrap; margin-bottom:20px; }
  .countdown-unit{
    background:rgba(255,255,255,.78);
    border:1.5px solid rgba(181,52,26,.28);
    border-radius:10px;
    width:90px; height:90px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    flex-shrink:1; min-width:0;
    backdrop-filter:blur(8px);
  }
  .countdown-number{
    font-family:var(--font-titre);
    font-size:clamp(1.4rem,5vw,2.4rem);
    color:var(--rouge);
    line-height:1;
    display:block;
    width:2.2ch;
    text-align:center;
    font-variant-numeric:tabular-nums;
  }
  .countdown-label{
    font-size:clamp(.5rem,1.5vw,.6rem);
    color:var(--texte-soft);
    text-transform:uppercase;
    letter-spacing:.1em;
    margin-top:5px;
    display:block;
    white-space:nowrap;
  }
  .countdown-tagline{
    font-family:var(--font-titre);
    font-style:italic;
    font-size:1rem;
    color:var(--rouge);
    margin-top:16px;
    display:block;
    opacity:.75;
  }
  .countdown-done{
    font-family:var(--font-titre);
    font-style:italic;
    font-size:clamp(1.3rem,3vw,2rem);
    color:var(--rouge);
    margin-top:20px;
  }

  /* ====== TIMELINE (inchangé) ====== */
  #timeline-desktop { padding: 90px 0 80px; position: relative; z-index: 2; }
  #timeline-desktop h2 { text-align: center; margin-bottom: 70px; font-family: var(--font-texte); font-style: normal; font-weight: 600; font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--corail); letter-spacing: 0.04em; text-transform: uppercase; }
  .timeline-wrapper { position: relative; display: flex; flex-direction: column; align-items: stretch; }
  .timeline-line-svg { position: absolute; top: 0; pointer-events: none; z-index: 0; overflow: visible; will-change: auto; }
  #timeline-path-bg { stroke: rgba(255,107,53,0.15); stroke-width: 3; fill: none; stroke-linecap: round; }
  #timeline-path-draw { stroke: url(#pathGrad); stroke-width: 3; fill: none; stroke-linecap: round; }
  .timeline-day { width: 100%; margin-bottom: 40px; position: relative; z-index: 1; }
  .timeline-day-label { text-align: center; font-family: var(--font-texte); font-size: 0.75rem; font-weight: 600; color: var(--corail); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; background: rgba(255,255,255,0.75); display: inline-block; padding: 7px 20px; border-radius: 30px; border: 1px solid rgba(255,107,53,0.25); position: relative; left: 50%; transform: translateX(-50%); backdrop-filter: blur(6px); }
  .timeline-events { display: flex; flex-direction: column; gap: 28px; }
  .timeline-event { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: start; gap: 0 16px; }
  .timeline-event:nth-child(odd) .event-side { grid-column: 1; text-align: right; align-items: flex-end; }
  .timeline-event:nth-child(odd) .event-dot { grid-column: 2; }
  .timeline-event:nth-child(odd) .event-img-col { grid-column: 3; }
  .timeline-event:nth-child(even) .event-img-col { grid-column: 1; }
  .timeline-event:nth-child(even) .event-dot { grid-column: 2; }
  .timeline-event:nth-child(even) .event-side { grid-column: 3; text-align: left; align-items: flex-start; }
  .event-side { display: flex; flex-direction: column; gap: 12px; }
  .event-dot { display: flex; align-items: flex-start; justify-content: center; padding-top: 16px; }
  .event-dot-inner { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, var(--rose), var(--corail)); box-shadow: 0 0 0 4px rgba(255,60,172,0.15), 0 0 14px rgba(255,60,172,0.35); flex-shrink: 0; position: relative; z-index: 2; }
