<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julie & Thomas — 24 juillet 2027</title>
  <meta name="description" content="Julie & Thomas se disent oui le 24 juillet 2027 à Verfeil. Venez célébrer avec nous !" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --rose:   #FF3CAC;
    --corail: #FF6B35;
    --ambre:  #FFB347;
    --rouge:  #b5341a;
    --blanc:  #ffffff;
    --texte:  #2e1200;
    --texte-soft: rgba(46,18,0,0.5);
    --font-titre: 'Playfair Display', Georgia, serif;
    --font-texte: 'Montserrat', system-ui, sans-serif;
    --radius: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body { font-family: var(--font-texte); color: var(--texte); overflow-x: hidden; background: transparent; }
  img, svg { display: block; max-width: 100%; }
  a { color: var(--corail); text-decoration: none; }
  a:hover { text-decoration: underline; }
  a:focus-visible { outline: 3px solid var(--corail); outline-offset: 3px; border-radius: 3px; }

  h1, h2, h3 { font-family: var(--font-titre); line-height: 1.15; }
  h1 { font-size: clamp(3rem, 9vw, 7rem); color: var(--blanc); }
  p { line-height: 1.7; }

  .container { width: min(90%, 960px); margin-inline: auto; }
  section { padding: 90px 0; position: relative; z-index: 2; }

  .reveal       { opacity:0; transform:translateY(40px);  transition:opacity .7s ease,transform .7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }
  .reveal-left  { opacity:0; transform:translateX(-40px); transition:opacity .7s ease,transform .7s ease; }
  .reveal-left.visible  { opacity:1; transform:translateX(0); }
  .reveal-right { opacity:0; transform:translateX(40px);  transition:opacity .7s ease,transform .7s ease; }
  .reveal-right.visible { opacity:1; transform:translateX(0); }

  @media (prefers-reduced-motion: reduce) {
    .reveal,.reveal-left,.reveal-right { opacity:1; transform:none; transition:none; }
    .lantern { animation: none !important; }
  }

  #panorama { position: absolute; top: 0; left: 0; width: 100%; z-index: 0; pointer-events: none; }
  #page-wrapper { position: relative; min-height: 100vh; }

  #lanterns-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100vh;
    z-index: 1; pointer-events: none;
    will-change: transform;
  }
  #lanterns-layer svg {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }
  .lantern { transform-origin: center center; }

  @keyframes float-a { 0%,100%{transform:translateY(0) rotate(-8deg)}  50%{transform:translateY(-18px) rotate(8deg)} }
  @keyframes float-b { 0%,100%{transform:translateY(0) rotate(6deg)}   50%{transform:translateY(-24px) rotate(-6deg)} }
  @keyframes float-c { 0%,100%{transform:translateY(0) rotate(-4deg)}  50%{transform:translateY(-12px) rotate(10deg)} }
  @keyframes float-d { 0%,100%{transform:translateY(0) rotate(10deg)}  50%{transform:translateY(-20px) rotate(-4deg)} }
  @keyframes float-e { 0%,100%{transform:translateY(0) rotate(-12deg)} 50%{transform:translateY(-16px) rotate(5deg)} }

  #hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; z-index: 2; }
  .hero-content { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .hero-date { font-family: var(--font-texte); font-weight: 400; font-size: clamp(0.85rem, 1.8vw, 1rem); color: rgba(255,255,255,0.82); letter-spacing: 0.25em; text-transform: uppercase; }
  .hero-tagline { font-family: var(--font-titre); font-style: italic; font-size: clamp(1.1rem, 2.5vw, 1.5rem); color: rgba(255,255,255,0.92); max-width: 480px; text-shadow: 0 2px 16px rgba(0,0,0,0.12); }
  .hero-scroll-hint { margin-top: 50px; color: rgba(255,255,255,0.55); font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; }

  #countdown { text-align: center; padding: 60px 20px 70px; position: relative; z-index: 2; }
  .countdown-grid { display: flex; justify-content: center; gap: clamp(6px, 2vw, 18px); flex-wrap: nowrap; margin-bottom: 20px; }
  .countdown-unit { background: rgba(255,255,255,0.78); border: 1.5px solid rgba(181,52,26,0.28); border-radius: 10px; width: 90px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 1; backdrop-filter: blur(8px); min-width: 0; }
  .countdown-number { font-family: var(--font-titre); font-size: clamp(1.4rem, 5vw, 2.4rem); color: var(--rouge); line-height: 1; display: block; width: 2.2ch; text-align: center; font-variant-numeric: tabular-nums; }
  .countdown-label { font-size: clamp(0.5rem, 1.5vw, 0.6rem); color: var(--texte-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px; display: block; white-space: nowrap; }
  .countdown-tagline { font-family: var(--font-titre); font-style: italic; font-size: 1rem; color: var(--rouge); margin-top: 16px; display: block; opacity: 0.75; }
  .countdown-done { font-family: var(--font-titre); font-style: italic; font-size: clamp(1.3rem, 3vw, 2rem); color: var(--rouge); margin-top: 20px; }

  #timeline-desktop { padding: 90px 0 80px; position: relative; z-index: 2; }
  #timeline-desktop h2 { text-align: center; margin-bottom: 70px; font-family: var(--font-texte); font-style: normal; font-weight: 600; font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--corail); letter-spacing: 0.04em; text-transform: uppercase; }
  .timeline-wrapper { position: relative; display: flex; flex-direction: column; align-items: stretch; }
  .timeline-line-svg { position: absolute; top: 0; pointer-events: none; z-index: 0; overflow: visible; }
  #timeline-path-bg  { stroke: rgba(255,107,53,0.15); stroke-width: 3; fill: none; stroke-linecap: round; }
  #timeline-path-draw { stroke: url(#pathGrad); stroke-width: 3; fill: none; stroke-linecap: round; }
  .timeline-day { width: 100%; margin-bottom: 40px; position: relative; z-index: 1; }
  .timeline-day-label { text-align: center; font-family: var(--font-texte); font-size: 0.75rem; font-weight: 600; color: var(--corail); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; background: rgba(255,255,255,0.75); display: inline-block; padding: 7px 20px; border-radius: 30px; border: 1px solid rgba(255,107,53,0.25); position: relative; left: 50%; transform: translateX(-50%); backdrop-filter: blur(6px); }
  .timeline-events { display: flex; flex-direction: column; gap: 28px; }
  .timeline-event { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: start; gap: 0 16px; }
  .timeline-event:nth-child(odd) .event-side    { grid-column: 1; text-align: right; align-items: flex-end; }
  .timeline-event:nth-child(odd) .event-dot     { grid-column: 2; }
  .timeline-event:nth-child(odd) .event-img-col { grid-column: 3; }
  .timeline-event:nth-child(even) .event-img-col { grid-column: 1; }
  .timeline-event:nth-child(even) .event-dot     { grid-column: 2; }
  .timeline-event:nth-child(even) .event-side    { grid-column: 3; text-align: left; align-items: flex-start; }
  .event-side { display: flex; flex-direction: column; gap: 12px; }
  .event-dot { display: flex; align-items: flex-start; justify-content: center; padding-top: 16px; }
  .event-dot-inner { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, var(--rose), var(--corail)); box-shadow: 0 0 0 4px rgba(255,60,172,0.15), 0 0 14px rgba(255,60,172,0.35); flex-shrink: 0; position: relative; z-index: 2; }
  .event-card { background: rgba(255,255,255,0.85); border-radius: var(--radius); padding: 22px 26px; border: 1px solid rgba(255,107,53,0.15); box-shadow: 0 4px 24px rgba(46,18,0,0.08); backdrop-filter: blur(10px); transition: box-shadow 0.4s ease; }
  .event-card:hover { box-shadow: 0 10px 40px rgba(46,18,0,0.14); }
  .event-time { font-size: 0.72rem; font-weight: 600; color: var(--corail); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .event-title { font-family: var(--font-titre); font-size: 1.15rem; color: var(--texte); margin-bottom: 8px; }
  .event-address { font-size: 0.8rem; color: var(--texte-soft); line-height: 1.6; }
  .event-map-link { display: inline-block; margin-top: 10px; font-size: 0.7rem; font-weight: 600; color: var(--corail); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(255,107,53,0.3); padding-bottom: 1px; transition: color 0.3s, border-color 0.3s; }
  .event-map-link:hover { color: var(--rose); border-color: var(--rose); text-decoration: none; }
  .event-img-col { display: flex; align-items: flex-start; padding-top: 4px; }
  .event-img-wrap { width: 100%; border-radius: var(--radius); overflow: hidden; box-shadow: 0 6px 28px rgba(46,18,0,0.12); border: 1.5px solid rgba(255,255,255,0.6); aspect-ratio: 4/3; position: relative; }
  .event-img-wrap svg { width: 100%; height: 100%; display: block; }
  .event-img-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 14px; background: linear-gradient(to top, rgba(46,18,0,0.45) 0%, transparent 60%); }
  .event-img-placeholder span { font-family: var(--font-titre); font-style: italic; font-size: 0.85rem; color: var(--blanc); text-align: center; text-shadow: 0 1px 6px rgba(0,0,0,0.4); }
  .event-img-placeholder small { font-size: 0.68rem; color: rgba(255,255,255,0.7); margin-top: 2px; display: block; text-align: center; }
  .img-todo-note { position: absolute; top: 8px; right: 8px; background: rgba(255,107,53,0.88); color: white; font-size: 0.6rem; font-weight: 600; padding: 3px 7px; border-radius: 6px; letter-spacing: 0.05em; text-transform: uppercase; }

  #timeline-mobile { display: none; position: relative; z-index: 2; }
  #timeline-mobile h2 { text-align: center; padding: 60px 20px 40px; font-family: var(--font-texte); font-style: normal; font-weight: 600; font-size: 1.5rem; color: var(--blanc); letter-spacing: 0.04em; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .tl-mobile-wrapper { position: relative; }
  #tl-mobile-line-svg { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40px; pointer-events: none; z-index: 0; overflow: visible; }
  #tl-mobile-path-bg   { stroke: rgba(255,255,255,0.25); stroke-width: 3; fill: none; stroke-linecap: round; }
  #tl-mobile-path-draw { stroke: url(#pathGradMobile); stroke-width: 3; fill: none; stroke-linecap: round; }
  .tl-step { position: relative; height: 200vh; }
  .tl-step-sticky { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; z-index: 2; }
  .tl-step-day { font-family: var(--font-texte); font-size: 0.7rem; font-weight: 600; color: var(--corail); letter-spacing: 0.15em; text-transform: uppercase; background: rgba(255,255,255,0.22); padding: 5px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.45); backdrop-filter: blur(8px); margin-bottom: 16px; opacity: 0; transform: translateY(-10px); transition: opacity 0.5s ease, transform 0.5s ease; position: relative; z-index: 3; text-shadow: 0 1px 4px rgba(0,0,0,0.12); }
  .tl-step-day.show { opacity: 1; transform: translateY(0); }
  .tl-step-dot { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, var(--rose), var(--corail)); box-shadow: 0 0 0 5px rgba(255,60,172,0.2), 0 0 18px rgba(255,60,172,0.4); margin-bottom: 20px; flex-shrink: 0; opacity: 0; transform: scale(0.5); transition: opacity 0.4s ease, transform 0.4s ease; position: relative; z-index: 3; }
  .tl-step-dot.show { opacity: 1; transform: scale(1); }
  .tl-step-card { background: rgba(255,255,255,0.92); border-radius: var(--radius); padding: 20px 22px; border: 1px solid rgba(255,107,53,0.15); box-shadow: 0 4px 24px rgba(46,18,0,0.12); backdrop-filter: blur(10px); width: 100%; max-width: 360px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s; position: relative; z-index: 3; }
  .tl-step-card.show { opacity: 1; transform: translateY(0); }
  .tl-step-img { width: 100%; max-width: 360px; border-radius: var(--radius); overflow: hidden; box-shadow: 0 6px 28px rgba(46,18,0,0.12); border: 1.5px solid rgba(255,255,255,0.6); aspect-ratio: 16/9; position: relative; margin-top: 14px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s; z-index: 3; }
  .tl-step-img.show { opacity: 1; transform: translateY(0); }
  .tl-step-img svg { width: 100%; height: 100%; display: block; }
  .tl-step-time { font-size: 0.7rem; font-weight: 600; color: var(--corail); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
  .tl-step-title { font-family: var(--font-titre); font-size: 1.2rem; color: var(--texte); margin-bottom: 6px; }
  .tl-step-address { font-size: 0.78rem; color: var(--texte-soft); line-height: 1.6; }
  .tl-step-map { display: inline-block; margin-top: 8px; font-size: 0.68rem; font-weight: 600; color: var(--corail); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(255,107,53,0.3); padding-bottom: 1px; }

  #rsvp { text-align: center; padding: 80px 20px 100px; position: relative; z-index: 2; }
  #rsvp h2 { font-family: var(--font-texte); font-style: normal; font-weight: 600; font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--corail); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .rsvp-subtitle { color: var(--texte-soft); margin-bottom: 50px; font-size: 0.9rem; }
  .rsvp-form-wrap { background: rgba(250,247,243,0.92); border: 1.5px solid rgba(181,52,26,0.18); border-radius: 20px; padding: clamp(24px, 5vw, 48px); max-width: 540px; margin-inline: auto; text-align: left; box-shadow: 0 8px 40px rgba(46,18,0,0.07); backdrop-filter: blur(12px); }
  .form-group { margin-bottom: 26px; }
  .form-group label, .form-group legend { display: block; font-family: var(--font-texte); font-weight: 600; font-size: 0.72rem; margin-bottom: 10px; color: var(--rouge); text-transform: uppercase; letter-spacing: 0.12em; }
  .form-group input[type="text"], .form-group textarea { width: 100%; padding: 14px 18px; border: 1.5px solid rgba(181,52,26,0.18); border-radius: 50px; font-family: var(--font-texte); font-size: 0.95rem; color: var(--texte); background: rgba(255,255,255,0.9); transition: border-color 0.3s, box-shadow 0.3s; resize: none; }
  .form-group textarea { border-radius: 16px; min-height: 110px; resize: vertical; }
  .form-group input[type="text"]:focus, .form-group textarea:focus { outline: none; border-color: var(--corail); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
  .radio-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .radio-btn { display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 12px 8px; border: 1.5px solid rgba(181,52,26,0.22); border-radius: 12px; transition: border-color 0.3s, background 0.3s, box-shadow 0.3s; background: rgba(255,255,255,0.85); user-select: none; min-width: 0; }
  .radio-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
  .radio-btn:hover { border-color: var(--corail); background: rgba(255,107,53,0.04); }
  .radio-btn.selected { border-color: var(--corail); background: rgba(255,107,53,0.07); box-shadow: 0 0 0 3px rgba(255,107,53,0.12); }
  .radio-btn-text { font-family: var(--font-texte); font-size: clamp(0.75rem, 2.5vw, 0.9rem); color: var(--texte); text-align: center; line-height: 1.3; word-break: break-word; }
  .field-error { color: var(--rouge); font-size: 0.78rem; margin-top: 6px; display: none; }
  .field-error.visible { display: block; }
  .btn-submit { display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--rose), var(--corail)); color: var(--blanc); border: none; border-radius: 12px; padding: 17px 40px; font-family: var(--font-texte); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s; box-shadow: 0 4px 20px rgba(255,60,172,0.28); width: 100%; margin-top: 8px; letter-spacing: 0.06em; }
  .btn-submit:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,60,172,0.38); }
  .btn-submit:focus-visible { outline: 3px solid var(--corail); outline-offset: 3px; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .rsvp-success { display: none; text-align: center; padding: 36px; background: rgba(255,107,53,0.06); border-radius: var(--radius); border: 1px solid rgba(255,107,53,0.2); margin-top: 20px; }
  .rsvp-success.visible { display: block; }
  .rsvp-success p { font-family: var(--font-titre); font-style: italic; font-size: 1.3rem; color: var(--corail); }
  .optional-hint { font-size: 0.72rem; font-style: italic; color: rgba(46,18,0,0.38); margin-top: 4px; display: block; }

  #final-scene { position: relative; height: 300vh; z-index: 2; }
  .final-sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; }
  .final-bg-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  #fireworks-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; opacity: 0; transition: opacity 0.6s ease; }
  #fireworks-canvas.visible { opacity: 1; }
  .final-text { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 5; pointer-events: none; width: 90%; max-width: 700px; }
  .final-title { font-family: var(--font-titre); font-size: clamp(2.5rem, 7vw, 5.5rem); color: var(--blanc); line-height: 1.1; text-shadow: 0 3px 30px rgba(180,60,20,0.5), 0 1px 8px rgba(0,0,0,0.2); margin-bottom: 10px; }
  .final-date { font-family: var(--font-texte); font-weight: 400; font-size: clamp(0.85rem, 1.8vw, 1.1rem); color: rgba(255,255,255,0.85); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 8px; }
  .final-tagline { font-family: var(--font-titre); font-style: italic; font-size: clamp(1rem, 2.2vw, 1.4rem); color: rgba(255,255,255,0.9); text-shadow: 0 2px 16px rgba(180,60,20,0.4); }
  #car-el { position: absolute; bottom: 22%; will-change: transform; z-index: 6; }

  @media (max-width: 700px) {
    #timeline-desktop { display: none; }
    #timeline-mobile  { display: block; }
  }
  @media (min-width: 701px) {
    #timeline-desktop { display: block; }
    #timeline-mobile  { display: none; }
  }

  @media print {
    #lanterns-layer, #panorama, #final-scene { display:none !important; }
    body { background: white; color: black; }
    section { padding: 20px 0; }
    .reveal,.reveal-left,.reveal-right { opacity:1; transform:none; }
  }
</style>
</head>
<body>
<div id="page-wrapper">

  <svg id="panorama" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMin slice" aria-hidden="true"></svg>

  <div id="lanterns-layer" aria-hidden="true">
    <svg id="lanterns-svg" xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 414 900" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="l-hot" cx="50%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#FFD166"/>
          <stop offset="50%"  stop-color="#FF6B35"/>
          <stop offset="100%" stop-color="#FF3CAC"/>
        </radialGradient>
        <radialGradient id="l-mag" cx="50%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#FF6B35"/>
          <stop offset="60%"  stop-color="#FF3CAC"/>
          <stop offset="100%" stop-color="#c0392b"/>
        </radialGradient>
        <radialGradient id="l-amb" cx="50%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#FFD166"/>
          <stop offset="60%"  stop-color="#FFB347"/>
          <stop offset="100%" stop-color="#FF6B35"/>
        </radialGradient>
        <radialGradient id="l-wht" cx="50%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#fff8f0" stop-opacity="0.80"/>
          <stop offset="45%"  stop-color="#ffe4c8" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#FFB347"  stop-opacity="0.20"/>
        </radialGradient>
        <filter id="glow-l">
          <feGaussianBlur stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-s">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-w">
          <feGaussianBlur stdDeviation="12" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Lanternes (contenu SVG original conservé) -->
      <!-- [Insérer ici le contenu SVG des lanternes du code original] -->
    </svg>
  </div>

  <section id="hero" aria-label="Accueil">
    <div class="hero-content">
      <p class="hero-date reveal">24 juillet 2027</p>
      <h1 class="reveal">Julie & Thomas</h1>
      <p class="hero-tagline reveal">On se dit oui ! Venez célébrer avec nous à Verfeil.</p>
      <p class="hero-scroll-hint reveal" aria-hidden="true">Défiler</p>
    </div>
  </section>

  <!-- COUNTDOWN, TIMELINE, RSVP, FINAL-SCENE (contenu HTML original conservé) -->

</div>

<script>
// ============================================
// CONFIGURATION ET UTILITAIRES
// ============================================
const CONFIG = { weddingDate: '2027-07-24T16:30:00+02:00' };
const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Throttle helper pour limiter les appels fréquents
function throttle(fn, delay) {
  let lastCall = 0;
  return function(...args) {
    const now = Date.now();
    if (now - lastCall >= delay) {
      lastCall = now;
      fn(...args);
    }
  };
}

// Cleanup manager pour éviter les fuites mémoire
const cleanupManager = {
  listeners: [],
  intervals: [],
  rafs: [],
  
  addListener(el, event, handler, options) {
    el.addEventListener(event, handler, options);
    this.listeners.push({ el, event, handler, options });
  },
  
  addInterval(id) {
    this.intervals.push(id);
  },
  
  addRAF(id) {
    this.rafs.push(id);
  },
  
  cleanup() {
    this.listeners.forEach(({ el, event, handler, options }) => {
      el.removeEventListener(event, handler, options);
    });
    this.intervals.forEach(id => clearInterval(id));
    this.rafs.forEach(id => cancelAnimationFrame(id));
    this.listeners = [];
    this.intervals = [];
    this.rafs = [];
  }
};

// Cleanup au déchargement
window.addEventListener('beforeunload', () => cleanupManager.cleanup());

// ============================================
// PANORAMA
// ============================================
(function buildPanorama() {
  try {
    const svg = document.getElementById('panorama');
    if (!svg) return;
    
    function draw() {
      const H = document.getElementById('page-wrapper')?.scrollHeight || window.innerHeight;
      svg.setAttribute('viewBox', '0 0 1440 ' + H);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', H);
      svg.style.height = H + 'px';
      
      const sunsetH  = H * 0.32;
      const collineY = H * 0.88;
      const footerY  = H * 0.93;
      
      svg.innerHTML = `
        <defs>
          <filter id="wc-bg"><feTurbulence type="fractalNoise" baseFrequency="0.006 0.01" numOctaves="4" seed="5" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="28" xChannelSelector="R" yChannelSelector="G"/></filter>
          <filter id="blur-bg"><feGaussianBlur stdDeviation="20"/></filter>
          <filter id="blur-col"><feGaussianBlur stdDeviation="6"/></filter>
          <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FF3CAC"/>
            <stop offset="${(sunsetH*.35/H*100).toFixed(1)}%" stop-color="#FF6B35"/>
            <stop offset="${(sunsetH*.65/H*100).toFixed(1)}%" stop-color="#FFCBA4"/>
            <stop offset="${(sunsetH/H*100).toFixed(1)}%" stop-color="#FFE8D6"/>
            <stop offset="${(H*.48/H*100).toFixed(1)}%" stop-color="#fff5f0"/>
            <stop offset="${(H*.62/H*100).toFixed(1)}%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#ffffff"/>
          </linearGradient>
          <radialGradient id="halo" cx="50%" cy="0%" r="60%">
            <stop offset="0%" stop-color="#FFD166" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="1440" height="${H}" fill="url(#bg-grad)"/>
        <ellipse cx="720" cy="${sunsetH*.5}" rx="700" ry="${sunsetH*.7}" fill="url(#halo)" opacity="0.6" filter="url(#blur-bg)"/>
        <ellipse cx="300" cy="${sunsetH*.25}" rx="350" ry="180" fill="#FF3CAC" opacity="0.08" filter="url(#blur-bg)"/>
        <ellipse cx="1150" cy="${sunsetH*.35}" rx="300" ry="160" fill="#FF6B35" opacity="0.07" filter="url(#blur-bg)"/>
        <path d="M-100 ${collineY+(footerY-collineY)*.3} Q360 ${collineY-(footerY-collineY)*.15} 720 ${collineY+(footerY-collineY)*.05} Q1080 ${collineY+(footerY-collineY)*.25} 1540 ${collineY+(footerY-collineY)*.1} L1540 ${H} L-100 ${H} Z" fill="#c8dfa0" opacity="0.28" filter="url(#blur-col)"/>
        <path d="M-100 ${collineY+(footerY-collineY)*.55} Q200 ${collineY+(footerY-collineY)*.2} 500 ${collineY+(footerY-collineY)*.45} Q720 ${collineY+(footerY-collineY)*.65} 950 ${collineY+(footerY-collineY)*.38} Q1200 ${collineY+(footerY-collineY)*.15} 1540 ${collineY+(footerY-collineY)*.5} L1540 ${H} L-100 ${H} Z" fill="#b0d080" opacity="0.38" filter="url(#wc-bg)"/>
        <path d="M-100 ${footerY*.985} Q360 ${collineY+(footerY-collineY)*.72} 720 ${footerY*.978} Q1080 ${collineY+(footerY-collineY)*.68} 1540 ${footerY*.982} L1540 ${H} L-100 ${H} Z" fill="#90c060" opacity="0.32" filter="url(#wc-bg)"/>
      `;
    }
    
    draw();
    cleanupManager.addListener(window, 'resize', draw);
  } catch (e) {
    console.error('Panorama error:', e);
  }
})();

// ============================================
// LANTERNES (Parallaxe 0.45x)
// ============================================
(function() {
  if (prefersReduced) return;
  try {
    const layer = document.getElementById('lanterns-layer');
    if (!layer) return;
    
    layer.style.transform = 'translateY(0px)';
    
    let rafId = null;
    const scrollHandler = () => {
      if (rafId) return;
      rafId = requestAnimationFrame(() => {
        rafId = null;
        layer.style.transform = 'translateY(-' + (window.scrollY * 0.45) + 'px)';
      });
      cleanupManager.addRAF(rafId);
    };
    
    cleanupManager.addListener(window, 'scroll', scrollHandler, { passive: true });
  } catch (e) {
    console.error('Lanterns error:', e);
  }
})();

// ============================================
// COUNTDOWN
// ============================================
(function() {
  try {
    const target = new Date(CONFIG.weddingDate).getTime();
    const grid = document.getElementById('countdown-grid');
    const done = document.getElementById('countdown-done');
    const tag  = document.getElementById('countdown-tagline');
    const els  = {
      d: document.getElementById('cd-days'),
      h: document.getElementById('cd-hours'),
      m: document.getElementById('cd-minutes'),
      s: document.getElementById('cd-seconds')
    };
    
    if (!grid || !done || !tag || !Object.values(els).every(e => e)) return;
    
    function pad(n) { return String(n).padStart(2, '0'); }
    
    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) {
        grid.style.display = 'none';
        tag.style.display = 'none';
        done.style.display = 'block';
        return;
      }
      els.d.textContent = pad(Math.floor(diff / 86400000));
      els.h.textContent = pad(Math.floor((diff % 86400000) / 3600000));
      els.m.textContent = pad(Math.floor((diff % 3600000) / 60000));
      els.s.textContent = pad(Math.floor((diff % 60000) / 1000));
    }
    
    tick();
    const intervalId = setInterval(tick, 1000);
    cleanupManager.addInterval(intervalId);
  } catch (e) {
    console.error('Countdown error:', e);
  }
})();

// ============================================
// REVEAL (Intersection Observer)
// ============================================
(function() {
  if (prefersReduced) return;
  try {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    
    document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el => obs.observe(el));
  } catch (e) {
    console.error('Reveal error:', e);
  }
})();

// ============================================
// TIMELINE DESKTOP
// ============================================
(function() {
  if (window.innerWidth <= 700 || prefersReduced) return;
  try {
    const section  = document.getElementById('timeline-desktop');
    const wrapper  = document.getElementById('timeline-wrapper');
    const lineSvg  = document.getElementById('timeline-line-svg');
    const pathBg   = document.getElementById('timeline-path-bg');
    const pathDraw = document.getElementById('timeline-path-draw');
    
    if (!section || !wrapper || !lineSvg) return;

    function wavyPath(cx, H) {
      const amp = 10, period = 100;
      let d = 'M ' + cx + ' 0', y = 0, dir = 1;
      while (y < H) {
        const nextY = Math.min(y + period, H);
        d += ' Q ' + (cx + dir * amp) + ' ' + (y + period / 2) + ' ' + cx + ' ' + nextY;
        y = nextY;
        dir *= -1;
      }
      return d;
    }

    let isSetup = false;

    function setup() {
      try {
        const firstDot = wrapper.querySelector('.event-dot');
        if (!firstDot) return;
        
        const wRect = wrapper.getBoundingClientRect();
        const dRect = firstDot.getBoundingClientRect();
        const cx = dRect.left + dRect.width / 2 - wRect.left;
        const H  = wrapper.offsetHeight;
        const svgW = 40;
        
        lineSvg.style.left   = (cx - svgW / 2) + 'px';
        lineSvg.style.width  = svgW + 'px';
        lineSvg.style.height = H + 'px';
        lineSvg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + H);
        
        const d = wavyPath(svgW / 2, H);
        pathBg.setAttribute('d', d);
        pathDraw.setAttribute('d', d);
        
        const len = pathDraw.getTotalLength ? pathDraw.getTotalLength() : H * 1.2;
        pathDraw.style.transition = 'none';
        pathDraw.style.strokeDasharray  = len;
        pathDraw.style.strokeDashoffset = len;
        pathDraw._len = len;
        
        requestAnimationFrame(() => {
          pathDraw.style.transition = 'stroke-dashoffset 0.12s ease-out';
        });
        
        isSetup = true;
      } catch (e) {
        console.error('Timeline setup error:', e);
      }
    }

    setTimeout(setup, 200);
    cleanupManager.addListener(window, 'resize', () => { isSetup = false; setup(); });

    const scrollHandler = throttle(() => {
      if (window.innerWidth <= 700 || !isSetup) return;
      const rect     = section.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > window.innerHeight) return;
      
      const total    = section.offsetHeight - window.innerHeight;
      const progress = Math.min(1, Math.max(0, -rect.top / (total * 1.1)));
      pathDraw.style.strokeDashoffset = (pathDraw._len || 1000) * (1 - progress);
    }, 16);
    
    cleanupManager.addListener(window, 'scroll', scrollHandler, { passive: true });
  } catch (e) {
    console.error('Timeline desktop error:', e);
  }
})();

// ============================================
// TIMELINE MOBILE
// ============================================
(function() {
  if (window.innerWidth > 700 || prefersReduced) return;
  try {
    const wrapper  = document.getElementById('tl-mobile-wrapper');
    const lineSvg  = document.getElementById('tl-mobile-line-svg');
    const pathBg   = document.getElementById('tl-mobile-path-bg');
    const pathDraw = document.getElementById('tl-mobile-path-draw');
    const steps    = document.querySelectorAll('.tl-step');
    
    if (!wrapper || !lineSvg || !steps.length) return;

    function wavyPath(cx, H) {
      const amp = 8, period = 80;
      let d = 'M ' + cx + ' 0', y = 0, dir = 1;
      while (y < H) {
        const nextY = Math.min(y + period, H);
        d += ' Q ' + (cx + dir * amp) + ' ' + (y + period / 2) + ' ' + cx + ' ' + nextY;
        y = nextY;
        dir *= -1;
      }
      return d;
    }

    function setupLine() {
      try {
        const H = wrapper.offsetHeight;
        lineSvg.style.height = H + 'px';
        lineSvg.setAttribute('viewBox', '0 0 40 ' + H);
        
        const d = wavyPath(20, H);
        pathBg.setAttribute('d', d);
        pathDraw.setAttribute('d', d);
        
        const len = pathDraw.getTotalLength ? pathDraw.getTotalLength() : H * 1.15;
        pathDraw.style.transition = 'none';
        pathDraw.style.strokeDasharray  = len;
        pathDraw.style.strokeDashoffset = len;
        pathDraw._len = len;
        
        requestAnimationFrame(() => {
          pathDraw.style.transition = 'stroke-dashoffset 0.1s linear';
        });
      } catch (e) {
        console.error('Mobile timeline setup error:', e);
      }
    }

    setTimeout(setupLine, 300);
    cleanupManager.addListener(window, 'resize', setupLine);

    const scrollHandler = throttle(() => {
      try {
        const wrapperRect = wrapper.getBoundingClientRect();
        const wrapperH    = wrapper.offsetHeight;
        const totalScroll = wrapperH - window.innerHeight;
        const scrolled    = Math.max(0, -wrapperRect.top);
        const globalProg  = Math.min(1, scrolled / totalScroll);
        const len = pathDraw._len || 1000;
        
        pathDraw.style.strokeDashoffset = len * (1 - globalProg);

        steps.forEach((step, i) => {
          const rect  = step.getBoundingClientRect();
          const stepH = step.offsetHeight;
          const prog  = Math.min(1, Math.max(0, -rect.top / (stepH - window.innerHeight)));

          const day  = document.getElementById('tl-day-'  + i);
          const dot  = document.getElementById('tl-dot-'  + i);
          const card = document.getElementById('tl-card-' + i);
          const img  = document.getElementById('tl-img-'  + i);

          if (prog >= 0.05) { day?.classList.add('show'); dot?.classList.add('show'); }
          else              { day?.classList.remove('show'); dot?.classList.remove('show'); }
          if (prog >= 0.3)  { card?.classList.add('show'); }
          else              { card?.classList.remove('show'); }
          if (prog >= 0.6)  { img?.classList.add('show'); }
          else              { img?.classList.remove('show'); }
        });
      } catch (e) {
        console.error('Mobile timeline scroll error:', e);
      }
    }, 16);
    
    cleanupManager.addListener(window, 'scroll', scrollHandler, { passive: true });
  } catch (e) {
    console.error('Timeline mobile error:', e);
  }
})();

// ============================================
// VOITURE + FEUX D'ARTIFICE
// ============================================
(function() {
  if (prefersReduced) return;
  try {
    const section = document.getElementById('final-scene');
    const car     = document.getElementById('car-el');
    const canvas  = document.getElementById('fireworks-canvas');
    
    if (!section || !car || !canvas) return;

    const ctx = canvas.getContext('2d');
    const carW = 200;

    function resizeCanvas() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    
    resizeCanvas();
    cleanupManager.addListener(window, 'resize', resizeCanvas);

    car.style.transform = 'translateX(' + (-carW - 20) + 'px)';

    const particles = [];
    let fwActive = false, fwRafId = null;
    const FW_COLORS = ['#FF3CAC','#FF6B35','#FFB347','#FFD166','#ffffff','#FF8C42','#ffaacc','#ffe0a0'];

    function burst(x, y) {
      const count = Math.floor(60 + Math.random()*40);
      const c1 = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
      const c2 = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
      
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI*2*i)/count + (Math.random()-0.5)*0.2;
        const speed = 2 + Math.random()*5;
        const life  = 60 + Math.random()*60;
        particles.push({
          x, y,
          vx: Math.cos(angle)*speed,
          vy: Math.sin(angle)*speed - Math.random()*2,
          alpha: 1,
          life,
          maxLife: life,
          radius: 1.5+Math.random()*2,
          color: Math.random()>0.5?c1:c2,
          trail: [],
          gravity: 0.06+Math.random()*0.06
        });
      }
    }

    function animateFW() {
      if (!fwActive) return;
      fwRafId = requestAnimationFrame(animateFW);
      cleanupManager.addRAF(fwRafId);
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.trail.push({x:p.x, y:p.y, alpha:p.alpha});
        if (p.trail.length > 6) p.trail.shift();
        
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        p.life--;
        p.alpha = p.life/p.maxLife;
        
        p.trail.forEach((tp, t) => {
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, p.radius*0.5, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = tp.alpha*0.3*(t/p.trail.length);
          ctx.fill();
        });
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
        
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    let burstTOs = [];
    
    function launchFW() {
      burstTOs.forEach(clearTimeout);
      burstTOs = [];
      
      const W = canvas.width, H = canvas.height;
      const pos = [
        {x:W*.2,y:H*.18},{x:W*.5,y:H*.12},{x:W*.78,y:H*.2},
        {x:W*.35,y:H*.28},{x:W*.65,y:H*.25},{x:W*.12,y:H*.3},{x:W*.88,y:H*.15}
      ];
      
      pos.forEach((p, i) => {
        const to = setTimeout(() => {
          burst(p.x, p.y);
          setTimeout(() => burst(p.x+(Math.random()-0.5)*80, p.y+(Math.random()-0.5)*40), 200);
        }, i*280);
        burstTOs.push(to);
      });
      
      const to = setTimeout(launchFW, pos.length*280+800);
      burstTOs.push(to);
    }

    function startFW() {
      if(fwActive) return;
      fwActive = true;
      canvas.classList.add('visible');
      launchFW();
      animateFW();
    }
    
    function stopFW() {
      if(!fwActive) return;
      fwActive = false;
      canvas.classList.remove('visible');
      burstTOs.forEach(clearTimeout);
      burstTOs = [];
      if(fwRafId) cancelAnimationFrame(fwRafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.length = 0;
    }

    let rafCar = null;
    let lastProgress = -1;

    function updateCar() {
      try {
        const rect  = section.getBoundingClientRect();
        const total = section.offsetHeight - window.innerHeight;

        if (rect.bottom <= 0 || rect.top >= window.innerHeight) {
          if (lastProgress > 0 && lastProgress < 1) {
            car.style.transform = 'translateX(' + (-carW - 20) + 'px)';
            stopFW();
          }
          lastProgress = -1;
          return;
        }

        const progress = Math.min(1, Math.max(0, -rect.top / total));

        if (Math.abs(progress - lastProgress) < 0.0005) return;
        lastProgress = progress;

        const startX = -carW - 20;
        const endX   = window.innerWidth + 20;
        car.style.transform = 'translateX(' + (startX + (endX - startX) * progress) + 'px)';

        if (progress >= 0.85) startFW();
        else stopFW();
      } catch (e) {
        console.error('Car update error:', e);
      }
    }

    const scrollHandler = () => {
      if (rafCar) cancelAnimationFrame(rafCar);
      rafCar = requestAnimationFrame(updateCar);
      cleanupManager.addRAF(rafCar);
    };
    
    cleanupManager.addListener(window, 'scroll', scrollHandler, { passive: true });
    cleanupManager.addListener(window, 'resize', () => {
      resizeCanvas();
      lastProgress = -1;
      updateCar();
    });

    updateCar();
  } catch (e) {
    console.error('Final scene error:', e);
  }
})();

// ============================================
// RADIO BUTTONS
// ============================================
(function() {
  try {
    document.querySelectorAll('.radio-btn input[type="radio"]').forEach(r => {
      cleanupManager.addListener(r, 'change', () => {
        document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
        if (r.checked) r.closest('.radio-btn').classList.add('selected');
      });
    });
  } catch (e) {
    console.error('Radio buttons error:', e);
  }
})();

// ============================================
// RSVP FORM
// ============================================
(function() {
  try {
    const form = document.getElementById('rsvp-form');
    const btn = document.getElementById('btn-submit');
    const success = document.getElementById('rsvp-success');
    const iframe = document.getElementById('hidden_iframe');
    const errorName = document.getElementById('error-name');
    const errorAtt = document.getElementById('error-attending');
    
    if (!form || !btn || !success || !iframe) return;
    
    let submitted = false;
    
    cleanupManager.addListener(iframe, 'load', () => {
      if(!submitted) return;
      form.style.display = 'none';
      success.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Confirmer';
      submitted = false;
    });
    
    cleanupManager.addListener(form, 'submit', (e) => {
      let valid = true;
      
      const nameVal = form.querySelector('#rsvp-name')?.value.trim() || '';
      if(!nameVal) {
        errorName?.classList.add('visible');
        if(valid) form.querySelector('#rsvp-name')?.focus();
        valid = false;
      } else {
        errorName?.classList.remove('visible');
      }
      
      const radioChecked = form.querySelector('input[name="ENTRY_ATTENDING_TODO"]:checked');
      if(!radioChecked) {
        errorAtt?.classList.add('visible');
        if(valid) document.querySelector('.radio-btn input')?.focus();
        valid = false;
      } else {
        errorAtt?.classList.remove('visible');
      }
      
      if(!valid) {
        e.preventDefault();
        return;
      }
      
      submitted = true;
      btn.disabled = true;
      btn.textContent = 'Envoi en cours...';
    });
  } catch (e) {
    console.error('RSVP form error:', e);
  }
})();
</script>
