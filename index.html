<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Julie & Thomas — 24 juillet 2027</title>
  <meta name="description" content="Julie & Thomas se disent oui le 24 juillet 2027 à Verfeil. Venez célébrer avec nous !" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="https://framerusercontent.com/images/6tUL6N8p40INoMoTwAhxIStFQEM.png" />

  <style>
    :root {
      --rose: #FF3CAC;
      --corail: #FF6B35;
      --ambre: #FFB347;
      --violet: #8B5CF6;
      --rouge: #b5341a;
      --blanc: #ffffff;
      --texte: #2e1200;
      --texte-soft: rgba(46,18,0,0.5);
      --font-titre: 'Playfair Display', Georgia, serif;
      --font-texte: 'Montserrat', system-ui, sans-serif;
      --radius: 14px;
      --transition-base: 0.3s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: var(--font-texte); color: var(--texte); overflow-x: hidden; background: transparent; }
    img, svg { display: block; max-width: 100%; }
    a { color: var(--corail); text-decoration: none; transition: color var(--transition-base), border-color var(--transition-base); }
    a:hover { text-decoration: underline; }
    a:focus-visible { outline: 3px solid var(--corail); outline-offset: 3px; border-radius: 3px; }

    h1, h2, h3 { font-family: var(--font-titre); line-height: 1.15; }
    h1 { font-size: clamp(3rem, 9vw, 7rem); color: var(--blanc); }
    p { line-height: 1.7; }

    .container { width: min(90%, 960px); margin-inline: auto; }
    section { padding: 90px 0; position: relative; z-index: 2; }

    /* Animations de révélation */
    .reveal, .reveal-left, .reveal-right { opacity: 0; transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal { transform: translateY(40px); }
    .reveal-left { transform: translateX(-40px); }
    .reveal-right { transform: translateX(40px); }
    .reveal.visible, .reveal-left.visible, .reveal-right.visible { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal-left, .reveal-right { opacity: 1; transform: none; transition: none; }
    }

    #page-wrapper { position: relative; min-height: 100vh; }
    #panorama { position: absolute; top: 0; left: 0; width: 100%; z-index: 0; pointer-events: none; }

    #lanterns-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; pointer-events: none; will-change: transform; transform: translate3d(0,0,0); }
    #lanterns-layer svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; }
    .lantern { animation-fill-mode: both; will-change: transform; transform: translate3d(0,0,0); backface-visibility: hidden; }
    .lantern image { filter: drop-shadow(0 0 10px rgba(255, 107, 53, 0.18)); }

    /* Animations de flottement amplifiées */
    @keyframes float-a { 0%,100% { transform: translate3d(0,0,0) rotate(-4deg); } 50% { transform: translate3d(0,-18px,0) rotate(4deg); } }
    @keyframes float-b { 0%,100% { transform: translate3d(0,0,0) rotate(3.5deg); } 50% { transform: translate3d(0,-22px,0) rotate(-3.5deg); } }
    @keyframes float-c { 0%,100% { transform: translate3d(0,0,0) rotate(-3deg); } 50% { transform: translate3d(0,-16px,0) rotate(3.5deg); } }
    @keyframes float-d { 0%,100% { transform: translate3d(0,0,0) rotate(4deg); } 50% { transform: translate3d(0,-20px,0) rotate(-3deg); } }
    @keyframes float-e { 0%,100% { transform: translate3d(0,0,0) rotate(-3.5deg); } 50% { transform: translate3d(0,-19px,0) rotate(3deg); } }

    /* Animation clignotement Rose et Violet alternés */
    @keyframes blink-rose-violet {
      0%, 100% { 
        color: var(--rose);
        text-shadow: 0 0 35px rgba(255, 60, 172, 0.9), 0 0 70px rgba(255, 60, 172, 0.5);
      }
      25% { 
        color: rgba(255, 60, 172, 0.4);
        text-shadow: 0 0 15px rgba(255, 60, 172, 0.4);
      }
      50% { 
        color: var(--violet);
        text-shadow: 0 0 35px rgba(139, 92, 246, 0.9), 0 0 70px rgba(139, 92, 246, 0.5);
      }
      75% { 
        color: rgba(139, 92, 246, 0.4);
        text-shadow: 0 0 15px rgba(139, 92, 246, 0.4);
      }
    }

    .highlight-blink {
      animation: blink-rose-violet 2.4s ease-in-out infinite;
      display: inline-block;
    }

    @media (prefers-reduced-motion: reduce) {
      .highlight-blink {
        animation: none;
        color: var(--blanc);
        text-shadow: 0 0 30px rgba(255, 60, 172, 0.8);
      }
    }

    /* Hero */
    #hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; z-index: 2; }
    .hero-content { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .hero-date { font-weight: 400; font-size: clamp(0.85rem, 1.8vw, 1rem); color: rgba(255,255,255,0.84); letter-spacing: 0.25em; text-transform: uppercase; }
    .hero-tagline { font-family: var(--font-titre); font-style: italic; font-size: clamp(1.1rem, 2.5vw, 1.5rem); color: rgba(255,255,255,0.92); max-width: 480px; text-shadow: 0 2px 16px rgba(0,0,0,0.12); }
    .hero-scroll-hint { margin-top: 50px; color: rgba(255,255,255,0.68); font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; display: inline-flex; flex-direction: column; align-items: center; gap: 10px; }
    .chevrons { display: grid; gap: 4px; opacity: 0.9; }
    .chevrons span { width: 16px; height: 16px; border-right: 2px solid rgba(255,255,255,0.8); border-bottom: 2px solid rgba(255,255,255,0.8); transform: rotate(45deg); border-radius: 2px; animation: chevron 1.4s ease-in-out infinite; }
    .chevrons span:nth-child(2) { animation-delay: 0.18s; opacity: 0.8; }
    @keyframes chevron { 0%,100% { transform: translate3d(0,0,0) rotate(45deg); opacity: 0.55; } 50% { transform: translate3d(0,6px,0) rotate(45deg); opacity: 1; } }

    /* Countdown - MISE EN GRAS */
    #countdown { text-align: center; padding: 60px 20px 70px; position: relative; z-index: 2; }
    .countdown-grid { display: flex; justify-content: center; gap: clamp(6px, 2vw, 18px); flex-wrap: nowrap; margin-bottom: 20px; }
    .countdown-unit { background: rgba(255,255,255,0.78); border: 1.5px solid rgba(139,92,246,0.28); border-radius: 10px; width: 90px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 1; backdrop-filter: blur(8px); min-width: 0; }
    .countdown-number { font-family: var(--font-titre); font-size: clamp(1.4rem, 5vw, 2.4rem); color: var(--violet); line-height: 1; display: block; width: 2.2ch; text-align: center; font-variant-numeric: tabular-nums; font-weight: 700; }
    .countdown-label { font-size: clamp(0.5rem, 1.5vw, 0.6rem); color: var(--texte-soft); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 5px; display: block; white-space: nowrap; font-weight: 600; }
    .countdown-tagline { font-family: var(--font-titre); font-style: italic; font-size: 1rem; color: var(--blanc); margin-top: 16px; display: block; opacity: 0.9; font-weight: 600; }
    .countdown-done { font-family: var(--font-titre); font-style: italic; font-size: clamp(1.3rem, 3vw, 2rem); color: var(--violet); margin-top: 20px; display: none; font-weight: 700; }

    /* Timeline Desktop */
    #timeline-desktop { padding: 90px 0 80px; position: relative; z-index: 2; }
    #timeline-desktop h2 { text-align: center; margin-bottom: 70px; font-weight: 600; font-size: clamp(1.6rem, 3.5vw, 2.4rem); color: var(--corail); letter-spacing: 0.04em; text-transform: uppercase; }
    .timeline-wrapper { position: relative; display: flex; flex-direction: column; align-items: stretch; }
    .timeline-line-svg { position: absolute; top: 0; pointer-events: none; z-index: 0; overflow: visible; }
    #timeline-path-bg { stroke: rgba(255,107,53,0.15); stroke-width: 3; fill: none; stroke-linecap: round; }
    #timeline-path-draw { stroke: url(#pathGrad); stroke-width: 3; fill: none; stroke-linecap: round; }
    .timeline-day { width: 100%; margin-bottom: 40px; position: relative; z-index: 1; }
    .timeline-day-label { text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--corail); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; background: rgba(255,255,255,0.92); display: inline-block; padding: 7px 20px; border-radius: 30px; border: 1px solid rgba(255,107,53,0.25); position: relative; left: 50%; transform: translateX(-50%); backdrop-filter: blur(6px); }
    .timeline-events { display: flex; flex-direction: column; gap: 28px; }
    .timeline-event { display: grid; grid-template-columns: 1fr 60px 1fr; align-items: start; gap: 0 16px; }
    .timeline-event:nth-child(odd) .event-side { grid-column: 1; text-align: right; }
    .timeline-event:nth-child(odd) .event-dot { grid-column: 2; }
    .timeline-event:nth-child(odd) .event-img-col { grid-column: 3; }
    .timeline-event:nth-child(even) .event-img-col { grid-column: 1; }
    .timeline-event:nth-child(even) .event-dot { grid-column: 2; }
    .timeline-event:nth-child(even) .event-side { grid-column: 3; text-align: left; }
    .event-side { display: flex; flex-direction: column; gap: 12px; }
    .event-dot { display: flex; align-items: flex-start; justify-content: center; padding-top: 16px; }
    .event-dot-inner { width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, var(--rose), var(--corail)); box-shadow: 0 0 0 4px rgba(255,60,172,0.15), 0 0 14px rgba(255,60,172,0.35); flex-shrink: 0; position: relative; z-index: 2; }
    .event-card { background: rgba(255,255,255,0.85); border-radius: var(--radius); padding: 22px 26px; border: 1px solid rgba(255,107,53,0.15); box-shadow: 0 4px 24px rgba(46,18,0,0.08); backdrop-filter: blur(10px); transition: box-shadow var(--transition-base); }
    .event-card:hover { box-shadow: 0 10px 40px rgba(46,18,0,0.14); }
    .event-time { font-size: 0.72rem; font-weight: 600; color: var(--corail); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
    .event-title { font-family: var(--font-titre); font-size: 1.15rem; color: var(--texte); margin-bottom: 8px; }
    .event-address { font-size: 0.8rem; color: var(--texte-soft); line-height: 1.6; }
    .event-map-link { display: inline-block; margin-top: 10px; font-size: 0.7rem; font-weight: 600; color: var(--corail); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(255,107,53,0.3); padding-bottom: 1px; }
    .event-map-link:hover { color: var(--rose); border-color: var(--rose); text-decoration: none; }
    .event-img-col { display: flex; align-items: flex-start; padding-top: 4px; }
    .event-img-wrap { width: 100%; border-radius: var(--radius); overflow: hidden; box-shadow: 0 6px 28px rgba(46,18,0,0.12); border: 1.5px solid rgba(255,255,255,0.6); aspect-ratio: 4/3; position: relative; background: linear-gradient(135deg,#ffb27a,#86bde8); }
    .event-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Timeline Mobile */
    #timeline-mobile { display: none; position: relative; z-index: 2; }
    #timeline-mobile h2 { text-align: center; padding: 60px 20px 40px; font-weight: 600; font-size: 1.5rem; color: var(--blanc); letter-spacing: 0.04em; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .tl-mobile-wrapper { position: relative; }
    #tl-mobile-line-svg { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40px; pointer-events: none; z-index: 0; overflow: visible; }
    #tl-mobile-path-bg { stroke: rgba(255,255,255,0.25); stroke-width: 3; fill: none; stroke-linecap: round; }
    #tl-mobile-path-draw { stroke: url(#pathGradMobile); stroke-width: 3; fill: none; stroke-linecap: round; }
    .tl-step { position: relative; height: 200vh; }
    .tl-step-sticky { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; z-index: 2; }
    .tl-step-day { font-size: 0.7rem; font-weight: 600; color: var(--corail); letter-spacing: 0.15em; text-transform: uppercase; background: rgba(255,255,255,0.75); padding: 5px 16px; border-radius: 20px; border: 1px solid rgba(255,107,53,0.45); backdrop-filter: blur(8px); margin-bottom: 16px; opacity: 0; transform: translateY(-10px); transition: opacity 0.5s ease, transform 0.5s ease; position: relative; z-index: 3; text-shadow: 0 1px 4px rgba(0,0,0,0.12); }
    .tl-step-day.show { opacity: 1; transform: translateY(0); }
    .tl-step-dot { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, var(--rose), var(--corail)); box-shadow: 0 0 0 5px rgba(255,60,172,0.2), 0 0 18px rgba(255,60,172,0.4); margin-bottom: 20px; flex-shrink: 0; opacity: 0; transform: scale(0.5); transition: opacity 0.4s ease, transform 0.4s ease; position: relative; z-index: 3; }
    .tl-step-dot.show { opacity: 1; transform: scale(1); }
    .tl-step-card { background: rgba(255,255,255,0.92); border-radius: var(--radius); padding: 20px 22px; border: 1px solid rgba(255,107,53,0.15); box-shadow: 0 4px 24px rgba(46,18,0,0.12); backdrop-filter: blur(10px); width: 100%; max-width: 360px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s; position: relative; z-index: 3; }
    .tl-step-card.show { opacity: 1; transform: translateY(0); }
    .tl-step-img { width: 100%; max-width: 360px; border-radius: var(--radius); overflow: hidden; box-shadow: 0 6px 28px rgba(46,18,0,0.12); border: 1.5px solid rgba(255,255,255,0.6); aspect-ratio: 16/9; position: relative; margin-top: 14px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease 0.2s, transform 0.5s ease 0.2s; z-index: 3; background: linear-gradient(135deg,#ffb27a,#86bde8); }
    .tl-step-img.show { opacity: 1; transform: translateY(0); }
    .tl-step-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tl-step-time { font-size: 0.7rem; font-weight: 600; color: var(--corail); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
    .tl-step-title { font-family: var(--font-titre); font-size: 1.2rem; color: var(--texte); margin-bottom: 6px; }
    .tl-step-address { font-size: 0.78rem; color: var(--texte-soft); line-height: 1.6; }
    .tl-step-map { display: inline-block; margin-top: 8px; font-size: 0.68rem; font-weight: 600; color: var(--corail); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid rgba(255,107,53,0.3); padding-bottom: 1px; }

    /* RSVP */
    #rsvp { 
      text-align: center; 
      padding: 80px 20px 100px; 
      position: relative; 
      z-index: 2; 
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,159,114,0.2) 30%, rgba(255,159,114,0.5) 60%, #ff9f72 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #rsvp h2 { 
      font-weight: 600; 
      font-size: clamp(1.6rem, 3.5vw, 2.4rem); 
      color: var(--blanc); 
      letter-spacing: 0.04em; 
      text-transform: uppercase; 
      margin-bottom: 8px; 
    }

    .rsvp-subtitle { 
      color: rgba(255,255,255,0.9); 
      margin-bottom: 50px; 
      font-size: 0.9rem; 
    }

    .rsvp-form-wrap { 
      background: rgba(250,247,243,0.96); 
      border: 1.5px solid rgba(181,52,26,0.18); 
      border-radius: 20px; 
      padding: clamp(24px, 5vw, 48px); 
      max-width: 540px; 
      margin-inline: auto; 
      text-align: left; 
      box-shadow: 0 8px 40px rgba(46,18,0,0.07); 
      backdrop-filter: blur(12px);
      width: 100%;
      box-sizing: border-box;
      -webkit-user-select: text;
      user-select: text;
    }

    .form-group { 
      margin-bottom: 26px; 
    }

    .form-group label, .form-group legend { 
      display: block; 
      font-weight: 600; 
      font-size: 0.72rem; 
      margin-bottom: 10px; 
      color: var(--rouge); 
      text-transform: uppercase; 
      letter-spacing: 0.12em; 
    }

    .form-group input[type="text"], .form-group textarea { 
      width: 100%; 
      padding: 14px 18px; 
      border: 1.5px solid rgba(181,52,26,0.18); 
      border-radius: 50px; 
      font-family: var(--font-texte); 
      font-size: 16px;
      color: var(--texte); 
      background: rgba(255,255,255,0.9); 
      transition: border-color var(--transition-base), box-shadow var(--transition-base); 
      resize: none;
      -webkit-appearance: none;
      appearance: none;
      -webkit-font-size-adjust: 100%;
      font-size-adjust: 100%;
      box-sizing: border-box;
    }

    .form-group textarea { 
      border-radius: 16px; 
      min-height: 110px; 
      resize: vertical; 
    }

    .form-group input[type="text"]:focus, .form-group textarea:focus { 
      outline: none; 
      border-color: var(--corail); 
      box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
    }

    .radio-row { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 10px; 
    }

    .radio-btn { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      padding: 12px 8px; 
      border: 1.5px solid rgba(181,52,26,0.22); 
      border-radius: 12px; 
      transition: border-color var(--transition-base), background var(--transition-base), box-shadow var(--transition-base); 
      background: rgba(255,255,255,0.85); 
      user-select: none; 
      min-width: 0;
      -webkit-user-select: none;
    }

    .radio-btn input[type="radio"] { 
      position: absolute; 
      opacity: 0; 
      width: 0; 
      height: 0; 
    }

    .radio-btn:hover { 
      border-color: var(--corail); 
      background: rgba(255,107,53,0.04); 
    }

    .radio-btn.selected { 
      border-color: var(--corail); 
      background: rgba(255,107,53,0.07); 
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12); 
    }

    .radio-btn-text { 
      font-size: clamp(0.75rem, 2.5vw, 0.9rem); 
      color: var(--texte); 
      text-align: center; 
      line-height: 1.3; 
      word-break: break-word; 
    }

    .field-error { 
      color: var(--rouge); 
      font-size: 0.78rem; 
      margin-top: 6px; 
      display: none; 
    }

    .field-error.visible { 
      display: block; 
    }

    .btn-submit { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 10px; 
      background: linear-gradient(135deg, var(--rose), var(--corail)); 
      color: var(--blanc); 
      border: none; 
      border-radius: 12px; 
      padding: 17px 40px; 
      font-family: var(--font-texte); 
      font-size: 16px;
      font-weight: 600; 
      cursor: pointer; 
      transition: opacity var(--transition-base), transform 0.2s, box-shadow var(--transition-base); 
      box-shadow: 0 4px 20px rgba(255,60,172,0.28); 
      width: 100%; 
      margin-top: 8px; 
      letter-spacing: 0.06em;
      -webkit-appearance: none;
      appearance: none;
      -webkit-font-size-adjust: 100%;
      font-size-adjust: 100%;
      min-height: 44px;
    }

    .btn-submit:hover:not(:disabled) { 
      opacity: 0.9; 
      transform: translateY(-2px); 
      box-shadow: 0 8px 28px rgba(255,60,172,0.38); 
    }

    .btn-submit:disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
      transform: none; 
    }

    .rsvp-success { 
      display: none; 
      text-align: center; 
      padding: 36px; 
      background: rgba(255,107,53,0.06); 
      border-radius: var(--radius); 
      border: 1px solid rgba(255,107,53,0.2); 
      margin-top: 20px; 
    }

    .rsvp-success.visible { 
      display: block; 
    }

    .rsvp-success p { 
      font-family: var(--font-titre); 
      font-style: italic; 
      font-size: 1.3rem; 
      color: var(--corail); 
    }

    .optional-hint { 
      font-size: 0.72rem; 
      font-style: italic; 
      color: rgba(46,18,0,0.38); 
      margin-top: 4px; 
      display: block; 
    }

    @supports (padding: max(0px)) {
      .rsvp-form-wrap {
        padding-bottom: max(48px, env(safe-area-inset-bottom));
      }
    }

    @media (max-height: 600px) {
      #rsvp {
        padding: 40px 20px 60px;
        min-height: auto;
      }
      .rsvp-form-wrap {
        padding: clamp(16px, 3vw, 32px);
      }
    }

    /* Final Scene */
    #final-scene { position: relative; height: 300vh; z-index: 2; }
    .final-sticky { position: sticky; top: 0; height: 100vh; overflow: hidden; }
    .final-bg-container { position: absolute; inset: 0; width: 100%; height: 100%; }
    .final-bg-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .final-bg-mountains { position: absolute; bottom: 0; left: 0; width: 100%; height: auto; object-fit: cover; object-position: bottom center; }
    #fireworks-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; opacity: 0; transition: opacity 0.6s ease; }
    #fireworks-canvas.visible { opacity: 1; }
    .final-text { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 5; pointer-events: none; width: 90%; max-width: 700px; }
    .final-title { font-family: var(--font-titre); font-size: clamp(2.5rem, 7vw, 5.5rem); color: var(--blanc); line-height: 1.1; text-shadow: 0 3px 30px rgba(180,60,20,0.5), 0 1px 8px rgba(0,0,0,0.2); margin-bottom: 10px; }

    @media (max-width: 700px) {

      #timeline-mobile { display: block; }
    }
    @media (min-width: 701px) {

    }

    @media print {

    }

    .ios-perf #panorama { display: none !important; }
    .ios-perf body { background: linear-gradient(to bottom, #020159 0%, #5a7fc8 20%, #b78fdd 45%, #ff87a8 70%, #fbbf24 100%); }
    .ios-perf .countdown-unit, .ios-perf .event-card, .ios-perf .timeline-day-label, .ios-perf .tl-step-day, .ios-perf .tl-step-card, .ios-perf .rsvp-form-wrap {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
      background: rgba(255,255,255,0.92) !important;

    .ios-perf svg [filter], .ios-perf svg filter { filter: none !important; }
    .ios-perf #lanterns-layer, .ios-perf #car-el { transform: translate3d(0,0,0); will-change: transform; }
  </style>
</head>

<script>
const CONFIG = { weddingDate: '2027-07-24T16:30:00+02:00' };

const Utils = {
  pad: (n) => String(n).padStart(2, '0'),
  debounce: (fn, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  },
  getElement: (id) => document.getElementById(id),
  queryAll: (selector) => document.querySelectorAll(selector)
};

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
if (isIOS) document.documentElement.classList.add('ios-perf');

// COUNTDOWN
(function() {
  const target = new Date(CONFIG.weddingDate).getTime();
  const grid = Utils.getElement('countdown-grid');
  const done = Utils.getElement('countdown-done');
  const tag = Utils.getElement('countdown-tagline');
  const els = {
    d: Utils.getElement('cd-days'),
    h: Utils.getElement('cd-hours'),
    m: Utils.getElement('cd-minutes'),
    s: Utils.getElement('cd-seconds')
  };
  function tick() {
    const diff = target - Date.now();
    if (diff <= 0) {
      grid.style.display = 'none';
      if (tag) tag.style.display = 'none';
      done.style.display = 'block';
      return;
    }
    els.d.textContent = Utils.pad(Math.floor(diff / 86400000));
    els.h.textContent = Utils.pad(Math.floor((diff % 86400000) / 3600000));
    els.m.textContent = Utils.pad(Math.floor((diff % 3600000) / 60000));
    els.s.textContent = Utils.pad(Math.floor((diff % 60000) / 1000));
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
